/* ── Filter bar ──────────────────────────────────────────────────── */

en": "No Need for 'Please' on the Training Ground—Commands Admit Not the Slightest Ambiguity", "title_zh": "训练场上不必说“请”字，口令容不得半点含糊", "summary": "A PLA Navy unit's political education outlet published a first-person instructional narrative in which a newly appointed assistant squad leader, Liu Guoyu, is corrected by Political Instructor Zhu Denghui for softening commands with the word 'please' toward senior enlisted soldiers—a practice the article labels 'ingratiating-style leadership' (讨好式管理). The piece is a routine political education vignette aimed at junior non-commissioned officers and signals ongoing PLA institutional concern about command authority and discipline at the squad level, particularly as newly promoted NCOs navigate relationships with longer-serving enlisted personnel. The announcement follows a standard pattern of PLA unit-level moral instruction and contains no new information about capability, posture, or order of battle.", "date": "2026-05-08", "date_fmt": "8 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["political_work"], "category_labels": ["Political Work"], "is_significant": false, "significance_reason": "", "relevance_score": 0.72, "url": "http://www.81.cn/yw_208727/16459278.html", "article_path": "article/35.html"}, {"id": 41, "title_en": "\"I Taught Soldiers How to Choose a Path, and Found the One I Wanted to Walk Myself\"", "title_zh": "\"我教会战士选择路，也找到了自己想走的那条路”", "summary": "The Information Support Force's official newspaper profiles Guo Kai, a company commander in an unspecified ISF unit, who re-enlisted in 2019 after a career as a geography teacher, was commissioned in 2021, and in 2024 was tasked with standing up a drone company on a coastal tidal-flat training area. The article is a routine human-interest recruitment and morale piece and contains no operationally significant information, though its publication in Information Support News confirms that the ISF is actively building out drone-capable company-level units in coastal terrain and is using personnel profiles to normalize the force's still-nascent institutional identity following the 2024 reorganization.", "date": "2026-05-08", "date_fmt": "8 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["political_work"], "category_labels": ["Political Work"], "is_significant": false, "significance_reason": "", "relevance_score": 0.72, "url": "http://www.81.cn/yw_208727/16459273.html", "article_path": "article/41.html"}, {"id": 65, "title_en": "There Is No Need to Say 'Please' on the Training Ground—Commands Cannot Tolerate the Slightest Ambiguity", "title_zh": "训练场上不必说“请”字，口令容不得半点含糊", "summary": "A PLA Navy unit's political instructor corrected a newly appointed assistant squad leader who had been softening commands with the word 'please,' framing the behavior as an 'ingratiating style of leadership' incompatible with military command authority. The article is a political education narrative aimed at junior NCOs, reinforcing that command clarity and positional authority take precedence over interpersonal deference—a recurring theme in PLA grassroots unit-building literature. The piece contains no new operational or organizational information and follows a standard format for PLA morale and discipline messaging.", "date": "2026-05-08", "date_fmt": "8 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["political_work"], "category_labels": ["Political Work"], "is_significant": false, "significance_reason": "", "relevance_score": 0.72, "url": "http://www.81.cn/hj_208557/16459321.html", "article_path": "article/65.html"}, {"id": 46, "title_en": "Streamlining Reimbursement Procedures for Small Official Expenditures — Service Members Must Not Pay Out of Pocket for Official Business", "title_zh": "优化小额因公支出报销流程，办公事不能让官兵“自掏腰包”", "summary": "A PLA Navy base headquarters, using a submarine crew unit as a pilot, overhauled reimbursement procedures for small official expenditures after finding that enlisted personnel—including Corporal Yin Mingming—were routinely absorbing minor work-related costs out of pocket rather than navigate a cumbersome claims process. The reform consolidated approval workflows, published dedicated reimbursement contacts, and established a 'maximum one visit' office for credential and welfare processing. The article is routine administrative reporting from a PLA outlet and signals no shift in operational posture or capability; its analytic value is limited to illustrating persistent friction between PLA grassroots units and rear-echelon headquarters bureaucracy, a recurring theme in PLA institutional reform coverage.", "date": "2026-05-08", "date_fmt": "8 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["political_work"], "category_labels": ["Political Work"], "is_significant": false, "significance_reason": "", "relevance_score": 0.7, "url": "http://www.81.cn/yw_208727/16459258.html", "article_path": "article/46.html"}, {"id": 48, "title_en": "An 'Demonstration of Incorrect Movements' Class That Takes an Unconventional Path Goes Viral in the Recruit Battalion", "title_zh": "一堂不走寻常路的“错误动作演示课”走红新兵营", "summary": "Squad Leader Lu Shangzeng of a PLA unit's Recruit 5th Battalion developed and implemented a 'demonstration of incorrect movements' training methodology that exposes recruits to common errors and randomized unexpected situations—including variable obstacle configurations and simulated equipment malfunctions—rather than drilling only standardized movements; his squad outperformed all others in a battalion-wide realistic-combat assessment, prompting the battalion to adopt the approach more broadly. The article is useful as ground-level evidence of an ongoing PLA effort to shift recruit training away from rote procedural execution toward adaptability under stress, consistent with the service-wide 实战化 (realistic combat) training push, and illustrates the institutional friction that accompanies that shift even at the squad level.", "date": "2026-05-08", "date_fmt": "8 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["doctrine", "political_work"], "category_labels": ["Doctrine", "Political Work"], "is_significant": false, "significance_reason": "", "relevance_score": 0.7, "url": "http://www.81.cn/yw_208727/16459277.html", "article_path": "article/48.html"}, {"id": 54, "title_en": "Sing the Song of Youth on the March Toward a Strong Military", "title_zh": "在强军征程上唱响青春之歌", "summary": "A PLA political education article published around May Fourth Youth Day calls on young officers and soldiers to internalize Xi Jinping's recent reply to youth award recipients, frame personal ambition within national military strengthening, and prioritize combat readiness and warfighting skill development. The piece is routine ideological mobilization content—drawing on standard CCP historical references to the Long March and Yan'an—and contains no new operational, organizational, or doctrinal information. It is useful only as a data point on the continuity of PLA political work messaging linking Xi's personal directives to unit-level ideological conditioning.", "date": "2026-05-08", "date_fmt": "8 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["political_work"], "category_labels": ["Political Work"], "is_significant": false, "significance_reason": "", "relevance_score": 0.7, "url": "http://www.81.cn/yw_208727/16459255.html", "article_path": "article/54.html"}, {"id": 55, "title_en": "International Observation | Remain Vigilant Against New Trends in Japan's 'Re-militarization'", "title_zh": "国际观察丨警惕日本“再军事化”新动向", "summary": "This article, published by a researcher at the CPC Central Committee Party School, argues that Japan's firing of Type 88 surface-to-ship missiles during the May 2025 U.S.-Philippines Balikatan exercise—the first Japanese offensive missile launch outside Japanese territory—exemplifies an accelerating pattern of military normalization that also includes Japan's transition from observer to full combat participant in Balikatan, the 2025 entry into force of the Japan-Philippines Reciprocal Access Agreement, the first stationing of Japanese military aircraft in Europe, and the April 2025 lifting of Japan's ban on lethal weapons exports. The piece is useful as a signal of official PRC framing: Beijing is consolidating these discrete Japanese defense policy developments into a unified 'new-type militarism' narrative and using the 80th anniversary of the Tokyo Trials as rhetorical leverage, suggesting this framing will feature in Chinese diplomatic messaging and information operations directed at regional audiences skeptical of Japanese rearmament.", "date": "2026-05-08", "date_fmt": "8 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["east_china_sea", "doctrine", "military_diplomacy"], "category_labels": ["East China Sea", "Doctrine", "Military Diplomacy"], "is_significant": false, "significance_reason": "", "relevance_score": 0.7, "url": "http://www.81.cn/yw_208727/16459269.html", "article_path": "article/55.html"}, {"id": 60, "title_en": "Always 'Taking the Initiative to Step Half a Pace Forward,' He Has Broadened the Military Careers of Many Comrades", "title_zh": "做事“主动向前迈半步”，他让许多战友的军旅之路更宽广", "summary": "First-Class Staff Sergeant Li Xin, an instructor at the training detachment of an unidentified naval unit, developed a dedicated vocational skills certification question bank for nearly 20 sub-specialties within the naval information and communications specialty after his unit's pass rate fell below 20 percent, subsequently raising it to 80 percent; he also co-authored a guidance handbook with counterparts from a naval academy to help non-commissioned officers navigate the certification process. The article is a human-interest profile with no operational or order-of-battle significance, but it incidentally documents a structural gap in the PLA Navy's vocational certification infrastructure—specifically, the absence of a service-specific question bank for information and communications specialties—that a junior NCO had to fill through individual initiative, suggesting institutional capacity constraints in PLA professional military education administration.", "date": "2026-05-08", "date_fmt": "8 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["political_work"], "category_labels": ["Political Work"], "is_significant": false, "significance_reason": "", "relevance_score": 0.7, "url": "http://www.81.cn/yw_208727/16459274.html", "article_path": "article/60.html"}, {"id": 63, "title_en": "Always 'Taking the Initiative to Step Half a Step Forward,' He Has Broadened the Military Careers of Many Comrades", "title_zh": "做事“主动向前迈半步”，他让许多战友的军旅之路更宽广", "summary": "Staff Sergeant First Class Li Xin, an instructor at the training cadre unit of an unidentified PLA Navy element, developed a dedicated vocational skills question bank for the Navy's information and communications specialty after identifying that the absence of Navy-specific materials was suppressing unit pass rates to below 20 percent; following the question bank's introduction, the pass rate rose to 80 percent. The article is a human-interest profile intended for internal PLA audiences and functions as institutional promotion of bottom-up initiative within the NCO corps, signaling ongoing efforts to professionalize enlisted career development infrastructure—particularly vocational credentialing systems—within PLA Navy communications specialties. The announcement follows a standard PLA propaganda pattern and contains no operationally significant new information, but it does confirm that the Navy's vocational skills assessment program for information and communications sub-specialties remains under development and that standardized training materials across services are not yet complete.", "date": "2026-05-08", "date_fmt": "8 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["personnel", "political_work"], "category_labels": ["Personnel", "Political Work"], "is_significant": false, "significance_reason": "", "relevance_score": 0.7, "url": "http://www.81.cn/hj_208557/16459317.html", "article_path": "article/63.html"}, {"id": 66, "title_en": "Streamlining Reimbursement Procedures for Small Official Expenditures: Personnel Must Not 'Pay Out of Pocket' for Official Business", "title_zh": "优化小额因公支出报销流程，办公事不能让官兵“自掏腰包”", "summary": "A PLA Navy submarine base—unit and location unspecified—identified a pattern in which enlisted personnel were absorbing small official expenses out of pocket rather than navigate a cumbersome reimbursement process, and responded by streamlining approval procedures, consolidating reimbursement cycles, and establishing a 'run at most once' administrative office for credential and welfare processing. The article is routine administrative reporting and signals no shift in operational posture or capability; its value is narrow, illustrating how PLA grassroots logistics and welfare administration function at the unit level and the friction points that erode personnel trust in institutional support systems.", "date": "2026-05-08", "date_fmt": "8 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["personnel", "political_work"], "category_labels": ["Personnel", "Political Work"], "is_significant": false, "significance_reason": "", "relevance_score": 0.7, "url": "http://www.81.cn/hj_208557/16459282.html", "article_path": "article/66.html"}, {"id": 68, "title_en": "Cultivating New People Through the Thought on Strengthening the Military | Soaring to the Clouds", "title_zh": "强军思想育新人丨“翀”上云霄", "summary": "On July 23, 2020, Xi Jinping visited the Air Force Aviation University, observed flight cadets conducting rotating-ladder training, and personally encouraged them to train rigorously and contribute to PLA modernization under the 'strengthening the military' framework. The visit, produced by the PLA News and Communication Center's Current Affairs Department with involvement from Unit 95006, is a routine propaganda piece reinforcing Xi's role as commander-in-chief and the ideological framing of military education around his 'Thought on Strengthening the Military.' The announcement follows a standard pattern of leadership inspection coverage and contains no new operational or capability information.", "date": "2026-05-08", "date_fmt": "8 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["political_work"], "category_labels": ["Political Work"], "is_significant": false, "significance_reason": "", "relevance_score": 0.7, "url": "http://www.81.cn/yw_208727/16459371.html", "article_path": "article/68.html"}, {"id": 12, "title_en": "First-Instance Verdicts Handed Down in the Cases of Wei Fenghe and Li Shangfu", "title_zh": "魏凤和案、李尚福案一审宣判", "summary": "On May 7, 2026, Chinese military courts handed down first-instance verdicts against Wei Fenghe and Li Shangfu—consecutive former Ministers of National Defense and Central Military Commission members—sentencing both to death with a two-year reprieve, permanent deprivation of political rights, and full asset confiscation, with automatic commutation to life imprisonment without possibility of reduction or parole. The verdicts mark the formal judicial conclusion of the most significant corruption prosecutions within the PLA's senior leadership in the Xi era, targeting two consecutive defense ministers and signaling that CMC-level rank provides no immunity from terminal career and legal consequences. The identical sentencing structure applied to both men, and the explicit bar on sentence reduction or parole, reflects a deliberate deterrence signal directed at the officer corps rather than a case-specific proportionality judgment.", "date": "2026-05-07", "date_fmt": "7 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["personnel"], "category_labels": ["Personnel"], "is_significant": true, "significance_reason": "First-instance verdicts against two consecutive former Defense Ministers and CMC members — Wei Fenghe and Li Shangfu — both receiving suspended death sentences, representing an unprecedented public accountability action at the highest level of PLA civilian leadership and signaling the scale of the corruption investigation within the defense establishment.", "relevance_score": 0.95, "url": "http://www.81.cn/yw_208727/16459190.html", "article_path": "article/12.html"}, {"id": 4, "title_en": "China Coast Guard Vessel Formation Patrols Diaoyu Islands Territorial Waters on May 7", "title_zh": "中国海警舰艇编队5月7日在我钓鱼岛领海巡航", "summary": "On May 7, a China Coast Guard formation led by vessel 1306 conducted a patrol in the waters around the Diaoyu Islands (Senkaku Islands), which Beijing claims as Chinese territory. The announcement follows a standard pattern of routine CCG patrols in the area and contains no new information about force composition, rules of engagement, or escalatory intent beyond the baseline pattern of persistent presence operations China uses to assert its territorial claims.", "date": "2026-05-07", "date_fmt": "7 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["east_china_sea", "coast_guard"], "category_labels": ["East China Sea", "Coast Guard"], "is_significant": false, "significance_reason": "", "relevance_score": 0.9, "url": "http://www.81.cn/yw_208727/16459188.html", "article_path": "article/4.html"}, {"id": 8, "title_en": "\"Veteran Pilots\" Retake the Unmanned Equipment Course, Turning \"Single-System Proficiency\" into \"System-Wide Linkage\"", "title_zh": "\"老飞手\"重修无人装备课，让“单装精通”成为“体系联动”", "summary": "A brigade under the 73rd Group Army, based in southern Fujian, has restructured its unmanned systems training after a mixed-formation exercise exposed coordination failures—including signal interference, overlapping UAV reconnaissance areas, and near-collisions among unmanned surface vessels—when more than ten unmanned platforms operated simultaneously. The brigade responded by forming a cross-specialty intensive training team, assigning dedicated signal channels to each platform type, and shifting the training objective from individual platform proficiency to integrated multi-system coordination across UAVs, robot dogs, and EOD robots. The report is useful for tracking how PLA ground forces at the brigade level are working through the practical command-and-control and electromagnetic deconfliction problems that arise when fielding heterogeneous unmanned systems at scale—a known gap between equipment acquisition and realized combat capability in the PLA's push toward manned-unmanned teaming.", "date": "2026-05-07", "date_fmt": "7 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["exercises", "modernization", "doctrine"], "category_labels": ["Exercises", "Modernization", "Doctrine"], "is_significant": false, "significance_reason": "", "relevance_score": 0.9, "url": "http://www.81.cn/yw_208727/16459090.html", "article_path": "article/8.html"}, {"id": 13, "title_en": "China Coast Guard Spokesperson Issues Statement", "title_zh": "中国海警局新闻发言人发表谈话", "summary": "China Coast Guard spokesperson Jiang Lue issued a statement on May 6 asserting that a Philippine Coast Guard unmanned aerial vehicle harassed the Chinese research vessel Xiangyanghong 33 while it conducted an ecological survey near Houteng Reef, and that CCG personnel responded in a lawful and professional manner. The statement follows an established CCG pattern of preemptively framing South China Sea incidents through official spokespeople to contest Philippine accounts and assert jurisdictional legitimacy over disputed features. The explicit reference to Houteng Reef and a named survey vessel adds granularity useful for tracking the geographic scope of Chinese maritime survey operations and the specific assets involved in contested-waters incidents.", "date": "2026-05-07", "date_fmt": "7 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["south_china_sea", "coast_guard"], "category_labels": ["South China Sea", "Coast Guard"], "is_significant": false, "significance_reason": "", "relevance_score": 0.9, "url": "http://www.81.cn/yw_208727/16459230.html", "article_path": "article/13.html"}, {"id": 23, "title_en": "Focus on Tactical Coordination! Multiple Images Unlock the People's Armed Police's Combat-Realistic Training →", "title_zh": "聚焦战术协同！多图解锁武警实战化训练→", "summary": "A mobile detachment under the People's Armed Police Beijing General Corps recently conducted multi-subject combat-realistic training with an emphasis on tactical coordination. The announcement is routine in content and format, reflecting standard PAP readiness messaging, and contains no new information about unit structure, equipment, or operational posture.", "date": "2026-05-07", "date_fmt": "7 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["exercises", "internal_security"], "category_labels": ["Exercises", "Internal Security"], "is_significant": false, "significance_reason": "", "relevance_score": 0.9, "url": "http://www.81.cn/wj_208567/16459162.html", "article_path": "article/23.html"}, {"id": 5, "title_en": "Military Forum | Grasping the Key Points for Accelerating the Development of National Defense Mobilization Capabilities", "title_zh": "军事论坛丨把握加快国防动员能力建设着力点", "summary": "Writing in PLA-affiliated media, Xia Wenxiang and Su Cao argue that China must accelerate national defense mobilization capability development by building military-civilian integrated systems capable of rapidly converting economic and technological potential into warfighting power, explicitly framing the 15th Five-Year Plan cycle and the concept of 'new-quality productive forces' as vehicles for that effort. The article is analytically useful as a doctrinal signal: it identifies current shortfalls—unclear military-to-civilian requirements transmission, path-dependent management structures, and gaps in unmanned and intelligent mobilization capabilities—and invokes recent U.S.-Israel-Iran conflict dynamics as justification for urgency, suggesting PLA planners are actively benchmarking mobilization readiness against observed high-intensity conflict. The emphasis on compressing the cycle from economic strength to combat capability, pre-positioned stocks, and cross-domain mobilization 'growth poles' reflects a continuing institutional effort to close the gap between China's declared whole-nation system advantages and its actual wartime sustainment capacity.", "date": "2026-05-07", "date_fmt": "7 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["modernization", "doctrine"], "category_labels": ["Modernization", "Doctrine"], "is_significant": false, "significance_reason": "", "relevance_score": 0.85, "url": "http://www.81.cn/yw_208727/16459103.html", "article_path": "article/5.html"}, {"id": 17, "title_en": "\"As Long as I Work Hard, I Can Do Better\" — A Profile of Xing Yingying, One of the Rocket Force's \"Top Ten Sword-Sharpening Vanguard Fighters (十大砺剑尖兵)\"", "title_zh": "“只要努力，我能做得更好”——记火箭军“十大砺剑尖兵”邢莹莹", "summary": "Xinhua profiled Xing Yingying, a PLA Rocket Force Staff Sergeant Third Class and 17-year communications specialist, who was named one of the Rocket Force's 'Top Ten Sword-Sharpening Vanguard Fighters' after winning multiple All-Army and Rocket Force communications competitions and developing a fault-localization methodology now used as a Rocket Force training reference. The profile is a standard PLA propaganda piece celebrating individual technical mastery and serves no independent analytic value, but it incidentally confirms that Rocket Force communications units conduct iterative equipment fielding with new assessment frameworks tied to operationally realistic scenarios, and that enlisted specialists at the staff sergeant level play a direct role in training backbone communications personnel and in real-time fault recovery during live-fire launch support missions.", "date": "2026-05-07", "date_fmt": "7 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["personnel", "nuclear", "political_work"], "category_labels": ["Personnel", "Nuclear", "Political Work"], "is_significant": false, "significance_reason": "", "relevance_score": 0.85, "url": "http://www.81.cn/yw_208727/16459233.html", "article_path": "article/17.html"}, {"id": 20, "title_en": "Young Backbone Personnel at Military-Wide Research Institutes Take on Heavy Responsibilities and Accelerate Their Development", "title_zh": "全军科研院所年轻骨干担当重任加速成长", "summary": "PLA Daily reports that military-wide research institutes—including the Academy of Military Sciences' Defense Science and Technology Innovation Research Institute, the National University of Defense Technology, the Naval Research Institute, and Rocket Force and Army research institutes—have significantly increased the share of researchers under 40 serving as project leaders or chief technical officers over the past three years, embedding young personnel in theater joint exercises, live-force confrontation drills, and field training to accelerate development under the 'research for war, talent for war' framework. The article signals an institutional push to compress the timeline for developing a technically proficient research cadre capable of supporting AI, intelligent command-and-control, and NBC defense systems in near-real combat conditions, with the two-way exchange mechanism between research institutes and operational units indicating deliberate effort to close the gap between laboratory development and field employment. The specific mention of AI integration into exercise-and-training chains at the Academy of Military Sciences and human-machine hybrid control work at the Army Research Institute provides evidence that PLA research institutes are actively operationalizing AI-enabled systems rather than conducting purely theoretical development.", "date": "2026-05-07", "date_fmt": "7 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["exercises", "modernization", "doctrine"], "category_labels": ["Exercises", "Modernization", "Doctrine"], "is_significant": false, "significance_reason": "", "relevance_score": 0.85, "url": "http://www.81.cn/yw_208727/16459087.html", "article_path": "article/20.html"}, {"id": 30, "title_en": "Sergeant Training Implements 'Dual-Mentor System,' Multiple Students Stand Out in Skills Competitions", "title_zh": "军士培养实行“双导师制”，多名学员在比武竞赛中崭露头角", "summary": "The Rocket Force Sergeant School has implemented a 'dual-mentor system' pairing professional instructors with frontline senior sergeants to train associate-to-bachelor's degree enlisted personnel, producing measurable results including a first-prize finish at the 8th National College Students Embedded Chip and System Design Competition. The initiative reflects the PLA Rocket Force's effort to close a recognized gap between theoretical knowledge and practical innovation capacity among its NCO corps, particularly as the force orients sergeant training explicitly toward requirements of 'informatized and intelligentized warfare.' The structured combination of academic instruction, frontline practitioner mentorship, and embedded research studios signals an institutional push to develop technically sophisticated enlisted specialists rather than relying solely on officer-led expertise for complex equipment operation and improvement.", "date": "2026-05-07", "date_fmt": "7 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["modernization", "personnel", "nuclear"], "category_labels": ["Modernization", "Personnel", "Nuclear"], "is_significant": false, "significance_reason": "", "relevance_score": 0.85, "url": "http://www.81.cn/yw_208727/16459096.html", "article_path": "article/30.html"}, {"id": 24, "title_en": "Resolving Servicemembers' Difficulties with Closed-Loop Implementation: Online Service Platform Bridges the 'Last Mile' of Grassroots Service", "title_zh": "为兵解难闭环落实，线上服务平台打通服务基层\"最后一公里\"", "summary": "A PLA Naval Aviation unit headquarters has deployed an online service platform enabling flight- and ground-crew personnel to submit welfare and operational complaints for tracked, closed-loop resolution, supplemented by institutionalized 'inspection and visit days' and two-way review meetings that allow enlisted personnel and junior officers to evaluate headquarters performance. The platform addresses a documented internal friction—slow feedback loops and low processing efficiency at the grassroots level—and reflects a broader PLA effort to manage retention-related grievances, particularly dependent-employment and quality-of-life issues that accompany assignment relocations. The announcement follows a standard PLA Daily pattern of publicizing internal service-improvement initiatives and contains no operationally significant new information, but is useful as evidence of persistent grassroots morale management challenges in naval aviation units.", "date": "2026-05-07", "date_fmt": "7 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["political_work"], "category_labels": ["Political Work"], "is_significant": false, "significance_reason": "", "relevance_score": 0.72, "url": "http://www.81.cn/yw_208727/16459098.html", "article_path": "article/24.html"}, {"id": 7, "title_en": "Abandoning the \"Good Enough\" Mentality Requires Firmly Establishing a Sense of Responsibility in One's Thinking", "title_zh": "摒弃“差不多”心态，就要在思想上树牢责任意识", "summary": "A political education article published in a PLA outlet, authored by Xiao Liming and Wang Zhongying, uses an equi vate Song Chengxin, a 19-year-old soldier assigned to a Xinjiang Military Region high-altitude training station at Kangxiwar in the Kunlun Mountains, recounting a birthday celebration organized by his squad amid austere plateau conditions. The article is a standard PLA Daily human-interest piece designed to promote recruitment and unit cohesion narratives—emphasizing sacrifice, camaraderie, and intergenerational military service—and contains no operationally significant information.", "date": "2026-05-07", "date_fmt": "7 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["internal_security", "political_work"], "category_labels": ["Internal Security", "Political Work"], "is_significant": false, "significance_reason": "", "relevance_score": 0.7, "url": "http://www.81.cn/yw_208727/16459118.html", "article_path": "article/22.html"}, {"id": 28, "title_en": "Song of Clean Conduct and Righteous Spirit | \"Never Seen Such an Army Before\"", "title_zh": "清风正气歌丨“从没见过这样的军队”", "summary": "A political education article published in a PLA outlet invokes Long March-era episodes—including the Red Army's conduct toward Yao villagers in Longsheng County in 1934 and figures such as Zhu De and Peng Dehuai—to argue that military effectiveness derives from ideological commitment, strict discipline, and civil-military unity rather than material superiority. The piece closes with a direct injunction to current PLA officers and soldiers to practice self-criticism, correct deviations, and preserve the 'fine traditions of the People's Army.' This is standard PLA political work content and follows an established pattern of using revolutionary history to reinforce present-day discipline and loyalty campaigns; it contains no new operational or organizational information.", "date": "2026-05-07", "date_fmt": "7 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["political_work"], "category_labels": ["Political Work"], "is_significant": false, "significance_reason": "", "relevance_score": 0.7, "url": "http://www.81.cn/yw_208727/16459093.html", "article_path": "article/28.html"}, {"id": 1, "title_en": "Drawing Cultivation Wisdom from Traditional Culture | 'Enrolled in the Register of Warriors, One Must Not Pause for Private Concerns'", "title_zh": "从传统文化中汲取修养智慧丨“名编壮士籍，不得中顾私”", "summary": "A PLA political education article published under the byline of Xiang Xianbiao invokes classical Chinese poetry, Han and Ming dynasty military figures, and Party-era martyrs to argue that PLA officers and soldiers must subordinate personal interests to national and Party missions, explicitly linking this norm to combat readiness and ideological discipline. The piece is a standard instance of the PLA's ongoing political work (政治工作) campaign to reinforce loyalty, self-sacrifice, and resistance to corruption through traditional culture and 'red gene' framing—a genre that has intensified since Xi Jinping's 2016 Gutian conference directives on military ideological rectification. It contains no new operational, organizational, or doctrinal information, but is useful as a data point on the continued emphasis within PLA political work on correcting 'erroneous ideological tendencies' and private self-interest among the force.", "date": "2026-05-07", "date_fmt": "7 May 2026", "source": "PLA Daily (解放军报)", "source_slug": "pla_daily", "categories": ["doctrine", "political_work"], "category_labels": ["Doctrine", "Political Work"], "is_significant": false, "significance_reason": "", "relevance_score": 0.6, "url": "http://www.81.cn/yw_208727/16459104.html", "article_path": "article/1.html"}];

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Group articles by date, preserving sort order
const byDate = {};
const dates = [];
ARTICLES.forEach(a => {
  if (!byDate[a.date]) { byDate[a.date] = []; dates.push(a.date); }
  byDate[a.date].push(a);
});
dates.sort((a, b) => b.localeCompare(a));

function renderRow(a) {
  const sig = a.is_significant
    ? '<span class="sig-dot" title="Significant"></span>'
    : '<span class="sig-dot-placeholder"></span>';
  const searchText = escapeHtml((a.title_en + ' ' + a.title_zh + ' ' + a.summary).toLowerCase());
  const catList = a.categories.join(',');
  return `<div class="article-row" data-date="${a.date}" data-cats="${catList}" data-sig="${a.is_significant ? 1 : 0}" data-search="${searchText}">
  <div class="row-left">
    ${sig}
    <a href="${escapeHtml(a.article_path)}" class="row-title">${escapeHtml(a.title_en || a.title_zh)}</a>
  </div>
  <span class="row-source">${escapeHtml(a.source)}</span>
</div>`;
}

function renderGroup(date) {
  const arts = byDate[date];
  const label = arts[0].date_fmt;
  const n = arts.length;
  return `<div class="date-group" data-date-group="${date}">
  <div class="date-header">
    <span class="date-label" data-date="${date}">${escapeHtml(label)}</span>
    <span class="date-count" id="count-${date}">${n} article${n !== 1 ? 's' : ''}</span>
  </div>
  ${arts.map(renderRow).join('')}
</div>`;
}

const listEl = document.getElementById('archive-list');
listEl.innerHTML = dates.map(renderGroup).join('');

// Clicking a date label filters to that date
listEl.addEventListener('click', e => {
  const label = e.target.closest('.date-label');
  if (!label) return;
  const d = label.dataset.date;
  document.getElementById('date-from').value = d;
  document.getElementById('date-to').value = d;
  applyFilters();
});

function applyFilters() {
  const query      = document.getElementById('search-input').value.trim().toLowerCase();
  const dateFrom   = document.getElementById('date-from').value;
  const dateTo     = document.getElementById('date-to').value;
  const sigOnly    = document.getElementById('sig-only').checked;
  const activeCats = Array.from(document.querySelectorAll('.cat-cb:checked')).map(cb => cb.value);

  let totalVisible = 0;

  document.querySelectorAll('.date-group').forEach(group => {
    const date = group.dataset.dateGroup;
    let groupVisible = 0;

    group.querySelectorAll('.article-row').forEach(row => {
      let show = true;
      if (query      && !row.dataset.search.includes(query))              show = false;
      if (dateFrom   && date < dateFrom)                                   show = false;
      if (dateTo     && date > dateTo)                                     show = false;
      if (sigOnly    && row.dataset.sig !== '1')                          show = false;
      if (activeCats.length) {
        const rowCats = row.dataset.cats.split(',').filter(Boolean);
        if (!activeCats.some(c => rowCats.includes(c)))                   show = false;
      }
      row.classList.toggle('hidden', !show);
      if (show) { groupVisible++; totalVisible++; }
    });

    group.classList.toggle('hidden', groupVisible === 0);
    const countEl = document.getElementById('count-' + date);
    if (countEl) {
      const total = group.querySelectorAll('.article-row').length;
      countEl.textContent = groupVisible === total
        ? `${total} article${total !== 1 ? 's' : ''}`
        : `${groupVisible} of ${total} article${total !== 1 ? 's' : ''}`;
    }
  });

  const total = ARTICLES.length;
  document.getElementById('filter-count').textContent = totalVisible === total
    ? `${total} articles`
    : `${totalVisible} of ${total} articles`;
}

['search-input', 'date-from', 'date-to'].forEach(id =>
  document.getElementById(id).addEventListener('input', applyFilters));
document.getElementById('sig-only').addEventListener('change', applyFilters);
document.querySelectorAll('.cat-cb').forEach(cb =>
  cb.addEventListener('change', applyFilters));

applyFilters();
</script>
