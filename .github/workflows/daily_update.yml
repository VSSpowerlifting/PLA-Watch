name: Daily PLA Watch Update

on:
  schedule:
    # GitHub Actions cron is UTC.  8 AM America/New_York spans:
    #   EDT (UTC-4): 12:00 UTC  |  EST (UTC-5): 13:00 UTC
    # We fire at :17 and :47 past each of those hours, plus a safety
    # window at 14:17 UTC, avoiding GitHub's top-of-hour load spikes.
    # A runtime window guard (≥08:00 NY) and a once-per-day state
    # file ensure the pipeline runs at most once per calendar day.
    - cron: '17,47 12 * * *'
    - cron: '17,47 13 * * *'
    - cron: '17 14 * * *'
  workflow_dispatch:         # Manual trigger from Actions tab

concurrency:
  group: daily-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      # ref: main ensures a queued run (serialized by concurrency group)
      # checks out the tip of main at job-start time, not the trigger SHA.
      # This way a second queued run sees the state file written by the first.
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0        # Full history needed for the push-back step

      # ── 2. Scheduling guard ────────────────────────────────────────────────
      # Manual dispatch: always run.
      # Scheduled: run only if NY time is at or after 08:00 AND today has not
      # already succeeded (tracked in .github/state/last_daily_run_date.txt).
      - name: Scheduling guard
        id: timecheck
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          STATE_FILE        = ".github/state/last_daily_run_date.txt"
          WINDOW_START_HOUR = 8

          event     = os.environ.get("GITHUB_EVENT_NAME", "")
          now       = datetime.now(ZoneInfo("America/New_York"))
          today_str = now.strftime("%Y-%m-%d")
          is_manual = event == "workflow_dispatch"

          # Read last-run date from state file (may not exist on first deploy)
          last_run = ""
          try:
              with open(STATE_FILE) as f:
                  last_run = f.read().strip()
          except FileNotFoundError:
              pass

          after_start = now.hour >= WINDOW_START_HOUR

          print(f"GitHub event:        {event}")
          print(f"New York time:       {now:%Y-%m-%d %H:%M:%S %Z}")
          print(f"Is manual dispatch:  {is_manual}")
          print(f"At or after 08:00:   {after_start}")
          print(f"Last run date:       {last_run!r}")
          print(f"Today (NY):          {today_str}")

          if is_manual:
              should_run = "true"
              reason = "manual dispatch — skipping all guards"
          elif last_run == today_str:
              should_run = "false"
              reason = f"already ran successfully today ({today_str})"
          elif not after_start:
              should_run = "false"
              reason = f"NY time {now:%H:%M} is before 08:00"
          else:
              should_run = "true"
              reason = f"NY time {now:%H:%M} is at or after 08:00 and today has not yet run"

          print(f"Decision:            should_run={should_run}")
          print(f"Reason:              {reason}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"should_run={should_run}\n")
              f.write(f"today_ny={today_str}\n")
          PY

      # ── 3. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.9
        if: steps.timecheck.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      # ── 4. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        if: steps.timecheck.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        if: steps.timecheck.outputs.should_run == 'true'
        run: playwright install chromium --with-deps

      # ── 5. Run pipeline (all sources) ─────────────────────────────────────
      - name: Run pipeline
        if: steps.timecheck.outputs.should_run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py

      # ── 6. Commit DB + site output back to main ───────────────────────────
      - name: Commit updated database and site output
        if: steps.timecheck.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pla_watch.db output/
          if git diff --cached --quiet; then
            echo "Nothing to commit — no new articles today."
          else
            git commit -m "Daily update: $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

      # ── 7. Deploy output/ to gh-pages ─────────────────────────────────────
      - name: Deploy to GitHub Pages
        if: steps.timecheck.outputs.should_run == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          cname: chinamilwatch.org
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: 'Deploy: ${{ github.run_id }}'

      # ── 8. Record successful run (scheduled only) ──────────────────────────
      # Written here — after deploy — so a deploy failure does not mark today
      # as done. Steps run with implicit success() so this is skipped if any
      # earlier step failed. Manual runs skip this entirely so a mid-day
      # manual trigger never blocks the next morning's automatic run.
      - name: Record successful scheduled run
        if: >
          steps.timecheck.outputs.should_run == 'true' &&
          github.event_name != 'workflow_dispatch'
        env:
          TODAY_NY: ${{ steps.timecheck.outputs.today_ny }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p .github/state
          echo "$TODAY_NY" > .github/state/last_daily_run_date.txt
          git add .github/state/last_daily_run_date.txt
          if git diff --cached --quiet; then
            echo "State file already up to date."
          else
            git pull --rebase origin main
            git commit -m "State: mark ${TODAY_NY} complete"
            git push
          fi
