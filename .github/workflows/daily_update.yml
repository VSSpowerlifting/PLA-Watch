name: Daily PLA Watch Update

on:
  schedule:
    # Two daily windows (EDT: 08:17 + 09:17 NY, UTC+4).
    # Reduced from five to limit retry cost on billing/API failures.
    # The scheduling guard ensures at most one successful run per NY calendar day.
    - cron: '17 12 * * *'
    - cron: '17 13 * * *'
  workflow_dispatch:         # Manual trigger from Actions tab

concurrency:
  group: daily-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      # ref: main ensures a queued run (serialized by concurrency group)
      # checks out the tip of main at job-start time, not the trigger SHA.
      # This way a second queued run sees the state file written by the first.
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0        # Full history needed for the push-back step

      # ── 2. Scheduling guard ────────────────────────────────────────────────
      # Manual dispatch: always run.
      # Scheduled: run once per NY calendar day (tracked in last_daily_run_date.txt).
      # No time-of-day window — late cron fires still update the site.
      - name: Scheduling guard
        id: timecheck
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          STATE_FILE         = ".github/state/last_daily_run_date.txt"
          FAILURE_FILE       = ".github/state/last_billing_failure_date.txt"
          event     = os.environ.get("GITHUB_EVENT_NAME", "")
          now       = datetime.now(ZoneInfo("America/New_York"))
          today_str = now.strftime("%Y-%m-%d")
          is_manual = event == "workflow_dispatch"

          def read_state(path):
              try:
                  with open(path) as f:
                      return f.read().strip()
              except FileNotFoundError:
                  return ""

          last_run     = read_state(STATE_FILE)
          last_failure = read_state(FAILURE_FILE)

          print(f"GitHub event:        {event}")
          print(f"New York time:       {now:%Y-%m-%d %H:%M:%S %Z}")
          print(f"Is manual dispatch:  {is_manual}")
          print(f"Last run date:       {last_run!r}")
          print(f"Last billing failure:{last_failure!r}")
          print(f"Today (NY):          {today_str}")

          if is_manual:
              should_run = "true"
              reason = "manual dispatch — skipping all guards"
          elif last_run == today_str:
              should_run = "false"
              reason = f"already ran successfully today ({today_str})"
          elif last_failure == today_str:
              should_run = "false"
              reason = (
                  f"billing/API failure already recorded today ({today_str}); "
                  "use workflow_dispatch to retry after fixing credits"
              )
          else:
              should_run = "true"
              reason = f"today ({today_str}) has not yet run"

          print(f"Decision:            should_run={should_run}")
          print(f"Reason:              {reason}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"should_run={should_run}\n")
              f.write(f"today_ny={today_str}\n")
          PY

      # ── 3. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.9
        if: steps.timecheck.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      # ── 4. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        if: steps.timecheck.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        if: steps.timecheck.outputs.should_run == 'true'
        run: playwright install chromium --with-deps

      # ── 5. Run pipeline (all sources) ─────────────────────────────────────
      - name: Run pipeline
        if: steps.timecheck.outputs.should_run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline.py

      # ── 6a. Commit billing-failure marker (scheduled runs only) ──────────
      # Runs even when the pipeline step fails so the marker reaches origin/main
      # and the scheduling guard can block later cron windows the same day.
      # workflow_dispatch skips this so a manual retry is always allowed.
      - name: Commit billing-failure marker (if pipeline failed)
        if: >
          failure() &&
          steps.timecheck.outputs.should_run == 'true' &&
          github.event_name != 'workflow_dispatch'
        run: |
          MARKER=".github/state/last_billing_failure_date.txt"
          if [ -f "$MARKER" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git pull --rebase origin main
            git add "$MARKER"
            if git diff --cached --quiet; then
              echo "Billing-failure marker already committed."
            else
              git commit -m "State: billing failure ${{ steps.timecheck.outputs.today_ny }}"
              git push origin main
            fi
          else
            echo "No billing-failure marker file found — skipping commit."
          fi

      # ── 6. Commit DB + site output back to main ───────────────────────────
      - name: Commit updated database and site output
        if: steps.timecheck.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pla_watch.db output/
          if git diff --cached --quiet; then
            echo "Nothing to commit — no new articles today."
          else
            git commit -m "Daily update: $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

      # ── 7. Deploy output/ to gh-pages ─────────────────────────────────────
      - name: Deploy to GitHub Pages
        if: steps.timecheck.outputs.should_run == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          cname: chinamilwatch.org
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: 'Deploy: ${{ github.run_id }}'

      # ── 8. Record successful run ───────────────────────────────────────────
      # Written here — after deploy — so a deploy failure does not mark today
      # as done. Steps run with implicit success() so this is skipped if any
      # earlier step failed. Both scheduled and manual runs write the state
      # file so a successful manual run prevents a duplicate scheduled run.
      - name: Record successful run
        if: steps.timecheck.outputs.should_run == 'true'
        env:
          TODAY_NY: ${{ steps.timecheck.outputs.today_ny }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          mkdir -p .github/state
          echo "$TODAY_NY" > .github/state/last_daily_run_date.txt
          git add .github/state/last_daily_run_date.txt
          if git diff --cached --quiet; then
            echo "State file already up to date."
          else
            git commit -m "State: mark daily run ${TODAY_NY}"
            git push origin main
          fi
