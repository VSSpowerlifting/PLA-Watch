<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}China Mil Watch — Open-Source Intelligence on Chinese Military and Security Developments{% endblock %}</title>
  <meta name="description" content="Daily-updating open-source intelligence tool that monitors Chinese-language military and security media. Translates from Mandarin and produces analytical summaries categorized across fourteen topic areas including Taiwan, South China Sea, modernization, and military diplomacy.">

  <!-- Open Graph -->
  <meta property="og:type"         content="website">
  <meta property="og:site_name"    content="China Mil Watch">
  <meta property="og:url"          content="https://chinamilwatch.org">
  <meta property="og:title"        content="China Mil Watch">
  <meta property="og:description"  content="Daily-updating open-source intelligence tool that monitors Chinese-language military and security media. Translates from Mandarin and produces analytical summaries categorized across fourteen topic areas including Taiwan, South China Sea, modernization, and military diplomacy.">
  <meta property="og:image"        content="https://chinamilwatch.org/og-image.png">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="China Mil Watch">
  <meta name="twitter:description" content="Daily-updating open-source intelligence tool that monitors Chinese-language military and security media. Translates from Mandarin and produces analytical summaries categorized across fourteen topic areas including Taiwan, South China Sea, modernization, and military diplomacy.">
  <meta name="twitter:image"       content="https://chinamilwatch.org/og-image.png">

  <link rel="icon" type="image/png" href="{{ root_path }}logo-icon.png">
  <link rel="apple-touch-icon" href="{{ root_path }}logo-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    /* ── Color system ───────────────────────────────────────────────────────── */
    :root {
      --color-brand:          #C8102E;
      --color-brand-dark:     #9B0B22;
      --color-brand-light:    #E8193A;
      --color-bg:             #F8F7F5;
      --color-bg-card:        #FFFFFF;
      --color-text-primary:   #1A1A1A;
      --color-text-secondary: #555555;
      --color-text-muted:     #888888;
      --color-border:         #E5E3DF;
      --color-accent:         #C8102E;
    }

    /* ── Reset ──────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-weight: 400;
      font-size: 1rem;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: var(--color-brand); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    .site-header {
      background: var(--color-brand);
      border-bottom: 2px solid var(--color-brand-dark);
      padding: 0 48px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-logo { display: flex; align-items: center; }
    .header-logo img { height: 36px; display: block; }
    .header-logo:hover { text-decoration: none; }

    .header-nav { display: flex; gap: 2rem; }
    .header-nav a {
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.15s;
    }
    .header-nav a:hover,
    .header-nav a.active { color: #ffffff; text-decoration: none; }

    /* ── Main layout ─────────────────────────────────────────────────────────── */
    main {
      flex: 1;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── Footer ─────────────────────────────────────────────────────────────── */
    .site-footer {
      background: var(--color-bg-card);
      border-top: 1px solid var(--color-border);
      padding: 40px;
      text-align: center;
    }
    .footer-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--color-text-primary);
      margin-bottom: 0.35rem;
    }
    .footer-desc {
      font-size: 0.8rem;
      color: var(--color-text-muted);
      line-height: 1.6;
    }

    /* ── Tags / chips ────────────────────────────────────────────────────────── */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.75rem;
    }
    .tag {
      display: inline-block;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-accent);
      border: 1px solid var(--color-accent);
      border-radius: 2px;
      padding: 2px 8px;
      background: transparent;
      line-height: 1.4;
    }

    /* ── Utilities ───────────────────────────────────────────────────────────── */
    .empty-state {
      color: var(--color-text-muted);
      font-style: italic;
      padding: 2rem 0;
    }

    /* ── Mobile ─────────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .site-header { padding: 0 16px; }
      .header-logo img { height: 28px; }
      .header-nav { gap: 1.25rem; }
      .header-nav a { font-size: 0.6875rem; letter-spacing: 0.06em; }
      main { padding: 1.5rem 1rem 3rem; }
      .site-footer { padding: 28px 16px; }
      body { font-size: 0.9375rem; }
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

<header class="site-header">
  <a href="{{ root_path }}index.html" class="header-logo">
    <img src="{{ root_path }}logo-wordmark.png" alt="China Mil Watch">
  </a>
  <nav class="header-nav">
    <a href="{{ root_path }}index.html" {% if active_page == 'index' %}class="active"{% endif %}>Daily Brief</a>
    <a href="{{ root_path }}archive.html" {% if active_page == 'archive' %}class="active"{% endif %}>Archive</a>
  </nav>
</header>

{% block hero %}{% endblock %}

<main>
  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <div class="footer-name">China Mil Watch</div>
  <div class="footer-desc">Open-source intelligence pipeline monitoring Chinese-language military and security media.</div>
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
